<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050a1a"/>
      <stop offset="100%" stop-color="#0a1230"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f8cff"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#4f8cff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4f8cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#glow)"/>

  <!-- Faint grid -->
  <g stroke="#4f8cff" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200"/>
    <path d="M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630"/>
  </g>

  <!-- NR monogram badge -->
  <g transform="translate(80,80)">
    <rect x="0" y="0" width="84" height="84" rx="18" fill="#050a1a" stroke="url(#accent)" stroke-width="2"/>
    <text x="42" y="56" font-family="Geist, system-ui, sans-serif" font-weight="700" font-size="36" text-anchor="middle" fill="url(#accent)">NR</text>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="280" font-family="Geist Mono, monospace" font-size="18" letter-spacing="3" fill="#8db0ff" opacity="0.9">BUSINESS ANALYTICS · DATA ANALYST</text>

  <!-- Name -->
  <text x="80" y="370" font-family="Geist, system-ui, sans-serif" font-weight="700" font-size="76" fill="#eef2fb">Niharika Raghunandan</text>

  <!-- Tagline -->
  <text x="80" y="430" font-family="Geist, system-ui, sans-serif" font-weight="400" font-size="32" fill="#b8c2d8">
    Turning messy data into decisions people can act on.
  </text>

  <!-- Skill chips -->
  <g font-family="Geist Mono, monospace" font-size="20" fill="#eef2fb">
    <g transform="translate(80,500)">
      <rect width="110" height="44" rx="22" fill="none" stroke="#4f8cff" stroke-opacity="0.5"/>
      <text x="55" y="29" text-anchor="middle">Python</text>
    </g>
    <g transform="translate(205,500)">
      <rect width="80" height="44" rx="22" fill="none" stroke="#4f8cff" stroke-opacity="0.5"/>
      <text x="40" y="29" text-anchor="middle">SQL</text>
    </g>
    <g transform="translate(300,500)">
      <rect width="120" height="44" rx="22" fill="none" stroke="#4f8cff" stroke-opacity="0.5"/>
      <text x="60" y="29" text-anchor="middle">Tableau</text>
    </g>
    <g transform="translate(435,500)">
      <rect width="120" height="44" rx="22" fill="none" stroke="#ffd166" stroke-opacity="0.65"/>
      <text x="60" y="29" text-anchor="middle" fill="#ffd166">Power BI</text>
    </g>
    <g transform="translate(570,500)">
      <rect width="220" height="44" rx="22" fill="none" stroke="#4f8cff" stroke-opacity="0.5"/>
      <text x="110" y="29" text-anchor="middle">Excel · SPSS · R</text>
    </g>
  </g>

  <!-- Decorative chart in the corner -->
  <g transform="translate(800,80)" stroke="#4f8cff" stroke-width="2" fill="none">
    <rect x="0" y="0" width="320" height="160" rx="12" stroke-opacity="0.4"/>
    <path d="M20 130 L70 100 L120 110 L170 70 L220 80 L270 40 L300 50" stroke="#4f8cff"/>
    <path d="M20 130 L70 100 L120 110 L170 70 L220 80 L270 40 L300 50 L300 140 L20 140 Z" fill="#4f8cff" fill-opacity="0.12" stroke="none"/>
    <circle cx="300" cy="50" r="6" fill="#ffd166" stroke="none"/>
    <text x="20" y="30" font-family="Geist Mono, monospace" font-size="14" fill="#8db0ff" stroke="none">live · forecast vs actual</text>
  </g>

  <!-- Bottom URL -->
  <text x="80" y="590" font-family="Geist Mono, monospace" font-size="18" fill="#8693b1" letter-spacing="2">PORTFOLIO · 2026</text>
</svg>
